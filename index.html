<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lokal — Discover culture wherever you are</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .hero {
      max-width: 480px;
    }

    .logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #1ABC9C;
      margin-bottom: 0.75rem;
    }

    .tagline {
      font-size: 1.15rem;
      color: #999;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .app-store-badge {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      font-size: 0.9rem;
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .app-store-badge:hover {
      border-color: #1ABC9C;
      color: #ccc;
    }

    .links {
      margin-top: 3rem;
      font-size: 0.85rem;
    }

    .links a {
      color: #666;
      text-decoration: none;
      margin: 0 0.75rem;
    }

    .links a:hover {
      color: #1ABC9C;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">Lokal</div>
    <p class="tagline">
      Discover concerts, exhibitions, festivals, and hidden cultural gems — wherever you are.
    </p>
    <a class="app-store-badge" href="#">Available on the App Store</a>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
